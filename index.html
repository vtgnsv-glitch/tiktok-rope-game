<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👧 ДЕВОЧКИ vs МАЛЬЧИКИ 👦</title>
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background-color: #0b0c10; display: flex; justify-content: center; align-items: center; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        .tiktok-container { width: 100vw; height: 100vh; max-width: 540px; background: linear-gradient(180deg, #12002b 0%, #080014 100%); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 15px; position: relative; }
        .match-title { color: #ffffff; font-size: 26px; font-weight: 900; margin-top: 10px; text-align: center; }
        .score-board { display: flex; justify-content: space-between; width: 100%; gap: 10px; }
        .team-score-card { width: 50%; background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 12px; text-align: center; border: 2px solid rgba(255, 255, 255, 0.1); }
        .girls-card { border-color: #ff007f; }
        .boys-card { border-color: #00d4ff; }
        .team-name { font-size: 14px; font-weight: 800; margin-bottom: 5px; }
        .girls-card .team-name { color: #ff007f; }
        .boys-card .team-name { color: #00d4ff; }
        .score-num { font-size: 42px; font-weight: 900; color: #ffffff; }
        .arena { width: 100%; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.4); border-top: 2px solid rgba(255, 255, 255, 0.1); border-bottom: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
        .center-line { position: absolute; width: 4px; height: 100%; background-color: #ffd700; z-index: 2; }
        .rope-container { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; transition: left 0.08s ease-out; }
        .rope { width: 100%; height: 14px; background: repeating-linear-gradient(45deg, #b87333, #b87333 10px, #8b4513 10px, #8b4513 20px); position: relative; }
        .flag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 18px; height: 45px; background-color: #ffd700; border-radius: 4px; z-index: 3; border: 2px solid #fff; }
        .fighters { display: flex; justify-content: space-between; width: 85%; font-size: 70px; z-index: 5; }
        .gifts-panel { width: 100%; background: rgba(255, 255, 255, 0.06); border-radius: 16px; padding: 12px; }
        .gifts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .gift-box { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); }
        .gift-name { color: #fff; font-size: 14px; font-weight: 800; }
        .gift-btn { font-size: 12px; font-weight: 900; padding: 6px 12px; border-radius: 8px; color: #fff; }
        .girl-btn { background: #ff007f; }
        .boy-btn { background: #00d4ff; color: #000; }
        .gift-popup { position: absolute; font-weight: 900; font-size: 20px; pointer-events: none; animation: popupAnim 0.8s ease-out forwards; z-index: 100; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        @keyframes popupAnim { 0% { opacity: 1; transform: translateY(0) scale(0.8); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }
    </style>
</head>
<body>
    <div class="tiktok-container" id="container">
        <div class="match-title">👧 ДЕВОЧКИ vs МАЛЬЧИКИ 👦</div>
        <div class="score-board">
            <div class="team-score-card girls-card">
                <div class="team-name">👧 ДЕВОЧКИ (🌹)</div>
                <div class="score-num" id="score-girls">0</div>
            </div>
            <div class="team-score-card boys-card">
                <div class="team-name">👦 МАЛЬЧИКИ (GG)</div>
                <div class="score-num" id="score-boys">0</div>
            </div>
        </div>
        <div class="arena">
            <div class="center-line"></div>
            <div class="rope-container" id="rope-container" style="left: 0px;">
                <div class="rope"><div class="flag"></div></div>
            </div>
        </div>
        <div class="fighters"><div>👩</div><div>👨</div></div>
        <div class="gifts-panel">
            <div style="text-align:center; color:#aaa; font-size:11px; font-weight:700;">ПАНЕЛЬ УПРАВЛЕНИЯ</div>
            <div class="gifts-grid">
                <div class="gift-box" onclick="addForce(-3, '👧 +1 🌹', '#ff007f')">
                    <span class="gift-name">🌹 Роза</span><span class="gift-btn girl-btn">Клик</span>
                </div>
                <div class="gift-box" onclick="addForce(3, '👦 +1 GG', '#00d4ff')">
                    <span class="gift-name">🎮 GG</span><span class="gift-btn boy-btn">Клик</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        let position = 0, targetPosition = 0, scoreGirls = 0, scoreBoys = 0;
        const ropeContainer = document.getElementById('rope-container');
        const scoreGirlsElem = document.getElementById('score-girls');
        const scoreBoysElem = document.getElementById('score-boys');
        const container = document.getElementById('container');

        function addForce(amount, label, color) {
            targetPosition += amount;
            if (targetPosition < -100) targetPosition = -100;
            if (targetPosition > 100) targetPosition = 100;
            showPopup(label, color);
        }

        function showPopup(text, color) {
            const popup = document.createElement('div');
            popup.className = 'gift-popup';
            popup.innerText = text;
            popup.style.color = color;
            popup.style.left = '35%';
            popup.style.top = '40%';
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function gameLoop() {
            position += (targetPosition - position) * 0.1;
            ropeContainer.style.left = `${(position / 100) * 120}px`;
            if (position <= -95) { scoreGirls++; scoreGirlsElem.innerText = scoreGirls; resetRope(); }
            else if (position >= 95) { scoreBoys++; scoreBoysElem.innerText = scoreBoys; resetRope(); }
            requestAnimationFrame(gameLoop);
        }
        function resetRope() { position = 0; targetPosition = 0; ropeContainer.style.left = '0px'; }
        gameLoop();
    </script>
</body>
</html>
