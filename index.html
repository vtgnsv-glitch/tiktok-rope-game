<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МАЛЬЧИКИ vs ДЕВОЧКИ - Перетягивание Каната TikTok Live</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Вертикальный формат 9:16 под TikTok */
        .tiktok-container {
            width: 405px;
            height: 720px;
            background: linear-gradient(180deg, #12002b 0%, #080014 100%);
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(255, 0, 128, 0.3), 0 0 35px rgba(0, 212, 255, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 3px solid #ff007f;
            padding: 15px 10px;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-top: 10px;
            z-index: 10;
        }

        .title-badge {
            background: linear-gradient(90deg, #ff007f, #7928ca, #00d4ff);
            background-size: 200% auto;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.5);
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .match-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 900;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .target-goal {
            color: #ffd700;
            font-size: 15px;
            font-weight: 800;
            margin-top: 3px;
            text-shadow: 0 0 8px rgba(255,215,0,0.6);
        }

        /* Табло со счетом */
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
            margin-top: 10px;
        }

        .team-score-card {
            width: 47%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .boys-card {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .girls-card {
            border-color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.2);
        }

        .team-name {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .boys-card .team-name { color: #00d4ff; }
        .girls-card .team-name { color: #ff007f; }

        .score-num {
            font-size: 38px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        /* Арена с канатом */
        .arena {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .center-line {
            position: absolute;
            width: 4px;
            height: 100%;
            background-color: #ffd700;
            box-shadow: 0 0 10px #ffd700;
            z-index: 2;
        }

        .finish-line-left {
            position: absolute;
            left: 10%;
            width: 3px;
            height: 100%;
            background-color: rgba(0, 212, 255, 0.6);
            border-right: 2px dashed #00d4ff;
        }

        .finish-line-right {
            position: absolute;
            right: 10%;
            width: 3px;
            height: 100%;
            background-color: rgba(255, 0, 128, 0.6);
            border-left: 2px dashed #ff007f;
        }

        .rope-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            transition: left 0.08s ease-out;
        }

        .rope {
            width: 100%;
            height: 14px;
            background: repeating-linear-gradient(
                45deg,
                #b87333,
                #b87333 10px,
                #8b4513 10px,
                #8b4513 20px
            );
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            position: relative;
        }

        .flag {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 45px;
            background-color: #ffd700;
            border-radius: 4px;
            box-shadow: 0 0 15px #ffd700;
            z-index: 3;
            border: 2px solid #fff;
        }

        /* Персонажи */
        .fighters {
            display: flex;
            justify-content: space-between;
            width: 90%;
            position: relative;
            z-index: 5;
        }

        .fighter {
            font-size: 65px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            transition: transform 0.05s ease;
        }

        #boy-fighter { transform: scaleX(-1); }

        /* Блок с Подарками / Интерактив */
        .gifts-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gifts-title {
            text-align: center;
            color: #aaa;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .gifts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .gift-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.1s, background 0.1s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gift-box:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.15);
        }

        .gift-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .gift-icon {
            font-size: 22px;
        }

        .gift-details {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .gift-name {
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }

        .gift-btn {
            font-size: 11px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            color: #fff;
        }

        .boy-btn-1 { background: #0080ff; }
        .boy-btn-5 { background: #00d4ff; color: #000; }
        .girl-btn-1 { background: #ff007f; }
        .girl-btn-5 { background: #ff66cc; color: #000; }

        /* Оповещение о подарке (анимация всплывашек) */
        .gift-popup {
            position: absolute;
            font-weight: 900;
            font-size: 22px;
            pointer-events: none;
            animation: popupAnim 0.8s ease-out forwards;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        @keyframes popupAnim {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { transform: translateY(-30px) scale(1.3); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* Экран Победы */
        .win-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .win-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .win-title {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }

        .restart-btn {
            background: linear-gradient(90deg, #ff007f, #00d4ff);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 900;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .footer-cta {
            background: linear-gradient(90deg, #00d4ff, #ff007f);
            color: white;
            width: 100%;
            padding: 10px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.5px;
            border-radius: 10px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="tiktok-container" id="container">
        <!-- Экран победы -->
        <div class="win-overlay" id="win-overlay">
            <div class="win-title" id="win-text">ПОБЕДА!</div>
            <button class="restart-btn" onclick="resetGame()">ИГРАТЬ СНОВА</button>
        </div>

        <div class="header">
            <span class="title-badge">🔴 TIKTOK LIVE БИТВА</span>
            <div class="match-title">МАЛЬЧИКИ vs ДЕВОЧКИ</div>
            <div class="target-goal">ИГРА ДО 50 ОЧКОВ 🏆</div>
        </div>

        <div class="score-board">
            <div class="team-score-card boys-card">
                <div class="team-name">👦 МАЛЬЧИКИ</div>
                <div class="score-num" id="score-boys">0</div>
            </div>
            <div class="team-score-card girls-card">
                <div class="team-name">👧 ДЕВОЧКИ</div>
                <div class="score-num" id="score-girls">0</div>
            </div>
        </div>

        <div class="arena">
            <div class="finish-line-left"></div>
            <div class="center-line"></div>
            <div class="finish-line-right"></div>
            
            <div class="rope-container" id="rope-container" style="left: 0px;">
                <div class="rope">
                    <div class="flag"></div>
                </div>
            </div>
        </div>

        <div class="fighters">
            <div class="fighter" id="boy-fighter">👨‍🎤</div>
            <div class="fighter" id="girl-fighter">👩‍🎤</div>
        </div>

        <!-- Кнопки Подарков (для кликов на стриме или проверки) -->
        <div class="gifts-panel">
            <div class="gifts-title">🎁 ПОДАРКИ / КЛИКИ ДЛЯ ПЕРЕТЯГИВАНИЯ</div>
            <div class="gifts-grid">
                <!-- Мальчики -->
                <div class="gift-box" onclick="addForce(-3, '👦 +1 Роза 🌹', '#00d4ff')">
                    <div class="gift-info">
                        <span class="gift-icon">🌹</span>
                        <div class="gift-details">
                            <span class="gift-name">Роза</span>
                        </div>
                    </div>
                    <span class="gift-btn boy-btn-1">👦 +1</span>
                </div>

                <div class="gift-box" onclick="addForce(-15, '👦 +5 Пончик 🍩', '#00d4ff')">
                    <div class="gift-info">
                        <span class="gift-icon">🍩</span>
                        <div class="gift-details">
                            <span class="gift-name">Пончик</span>
                        </div>
                    </div>
                    <span class="gift-btn boy-btn-5">👦 +5</span>
                </div>

                <!-- Девочки -->
                <div class="gift-box" onclick="addForce(3, '👧 +1 Роза 🌹', '#ff007f')">
                    <div class="gift-info">
                        <span class="gift-icon">🌹</span>
                        <div class="gift-details">
                            <span class="gift-name">Роза</span>
                        </div>
                    </div>
                    <span class="gift-btn girl-btn-1">👧 +1</span>
                </div>

                <div class="gift-box" onclick="addForce(15, '👧 +5 Пончик 🍩', '#ff007f')">
                    <div class="gift-info">
                        <span class="gift-icon">🍩</span>
                        <div class="gift-details">
                            <span class="gift-name">Пончик</span>
                        </div>
                    </div>
                    <span class="gift-btn girl-btn-5">👧 +5</span>
                </div>
            </div>
        </div>

        <div class="footer-cta">
            ОТПРАВЛЯЙ ПОДАРКИ, ЧТОБЫ ПОМОЧЬ СВОИМ! 👇
        </div>
    </div>

    <script>
        let position = 0; // -100 (победа мальчиков) до +100 (победа девочек)
        let targetPosition = 0;
        let scoreBoys = 0;
        let scoreGirls = 0;
        const targetScore = 50;
        let isGameOver = false;

        const ropeContainer = document.getElementById('rope-container');
        const boyFighter = document.getElementById('boy-fighter');
        const girlFighter = document.getElementById('girl-fighter');
        const scoreBoysElem = document.getElementById('score-boys');
        const scoreGirlsElem = document.getElementById('score-girls');
        const winOverlay = document.getElementById('win-overlay');
        const winText = document.getElementById('win-text');
        const container = document.getElementById('container');

        // Добавление силы (от подарка или авто-бота)
        function addForce(amount, label = '', color = '#fff') {
            if (isGameOver) return;

            targetPosition += amount;
            
            // Ограничение движения каната
            if (targetPosition < -100) targetPosition = -100;
            if (targetPosition > 100) targetPosition = 100;

            if (label) {
                showPopup(label, color);
            }
        }

        // Всплывающие уведомления о подарках
        function showPopup(text, color) {
            const popup = document.createElement('div');
            popup.className = 'gift-popup';
            popup.innerText = text;
            popup.style.color = color;
            
            // Случайное смещение для эффекта
            const randomX = Math.random() * 100 + 150;
            popup.style.left = `${randomX}px`;
            popup.style.top = `380px`;

            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // Автоматический фоновый «бой» (симмуляция активности зрителей)
        function autoSimulation() {
            if (isGameOver) return;

            // Небольшой случайный занос каната
            const randomForce = (Math.random() - 0.5) * 4;
            targetPosition += randomForce;

            // Шанс выпадения случайного авто-подарка от "зрителей"
            if (Math.random() < 0.08) {
                const isBoy = Math.random() < 0.5;
                const isBig = Math.random() < 0.2; // 20% шанс на +5

                if (isBoy) {
                    addForce(isBig ? -12 : -3, isBig ? '👦 +5 Пончик 🍩' : '👦 +1 Роза 🌹', '#00d4ff');
                } else {
                    addForce(isBig ? 12 : 3, isBig ? '👧 +5 Пончик 🍩' : '👧 +1 Роза 🌹', '#ff007f');
                }
            }
        }

        // Главный цикл анимации (60 кадров в сек)
        function gameLoop() {
            if (!isGameOver) {
                // Плавная интерполяция движения каната
                position += (targetPosition - position) * 0.1;
                
                // Перевод в пиксели (макс смещение ~120px в каждую сторону)
                const shiftPx = (position / 100) * 120;
                ropeContainer.style.left = `${shiftPx}px`;

                // Анимация тряски бойцов
                const shakeBoy = (Math.random() - 0.5) * (Math.abs(position) / 10 + 2);
                const shakeGirl = (Math.random() - 0.5) * (Math.abs(position) / 10 + 2);
                boyFighter.style.transform = `scaleX(-1) translateY(${shakeBoy}px)`;
                girlFighter.style.transform = `translateY(${shakeGirl}px)`;

                // Проверка достижения края в раунде
                if (position <= -95) {
                    scoreBoys++;
                    scoreBoysElem.innerText = scoreBoys;
                    checkOverallWin('👦 МАЛЬЧИКИ');
                    resetRope();
                } else if (position >= 95) {
                    scoreGirls++;
                    scoreGirlsElem.innerText = scoreGirls;
                    checkOverallWin('👧 ДЕВОЧКИ');
                    resetRope();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function resetRope() {
            position = 0;
            targetPosition = 0;
            ropeContainer.style.left = '0px';
        }

        function checkOverallWin(winnerName) {
            if (scoreBoys >= targetScore || scoreGirls >= targetScore) {
                isGameOver = true;
                winText.innerText = `${winnerName}\nПОБЕДИЛИ! 🎉`;
                winText.style.color = winnerName.includes('МАЛЬЧИКИ') ? '#00d4ff' : '#ff007f';
                winOverlay.classList.add('active');
            }
        }

        function resetGame() {
            scoreBoys = 0;
            scoreGirls = 0;
            scoreBoysElem.innerText = '0';
            scoreGirlsElem.innerText = '0';
            isGameOver = false;
            winOverlay.classList.remove('active');
            resetRope();
        }

        // Запуск
        setInterval(autoSimulation, 100);
        gameLoop();
        // ==========================================
// ПОДКЛЮЧЕНИЕ К NODE.JS СЕРВЕРУ ДЛЯ TIKTOK LIVE
// ==========================================
const ws = new WebSocket('ws://localhost:8080');

ws.onopen = () => {
    console.log('Подключено к Node.js серверу TikTok!');
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'gift') {
        // Проверяем giftName или giftId
        const giftName = data.giftName.toLowerCase();
        const repeatCount = data.repeatCount || 1;

        // Если прислали Розу (Rose)
        if (giftName.includes('rose') || giftName.includes('роза')) {
            if (data.team === 'boy') {
                addForce(-3 * repeatCount, `👦 +${repeatCount} Роза 🌹`, '#00d4ff');
            } else {
                addForce(3 * repeatCount, `👧 +${repeatCount} Роза 🌹`, '#ff007f');
            }
        } 
        // Если прислали Пончик (Doughnut) или любой дорогой подарок
        else if (giftName.includes('donut') || giftName.includes('doughnut') || giftName.includes('пончик')) {
            if (data.team === 'boy') {
                addForce(-15 * repeatCount, `👦 +${5 * repeatCount} Пончик 🍩`, '#00d4ff');
            } else {
                addForce(15 * repeatCount, `👧 +${5 * repeatCount} Пончик 🍩`, '#ff007f');
            }
        }
    }
};
    </script>
</body>
</html>
